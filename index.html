<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G7 HITECH | Innovation. Implementation. Education.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        /* CSS STYLES */
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --accent-color: #00d4ff;
            --text-main: #ffffff;
            --text-dim: #a3b1bc;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(11, 14, 20, 0.9);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--accent-color);
            letter-spacing: 2px;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 30px;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        /* Hero Section */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            background: radial-gradient(circle at center, #1a2332 0%, #0b0e14 70%);
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-dim);
            max-width: 700px;
            margin-bottom: 30px;
        }

        /* Buttons */
        .btn-primary {
            background-color: var(--accent-color);
            color: #000;
            padding: 15px 35px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
            transform: translateY(-3px);
        }

        /* Contact Info Bar */
        .contact-bar {
            background: var(--card-bg);
            padding: 15px;
            text-align: center;
            font-size: 0.9rem;
            border-top: 1px solid #30363d;
        }

        .accent-text { color: var(--accent-color); }

    </style>
</head>
<body>

    <nav>
        <div class="logo">G7 HITECH</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Services</a>
            <a href="#">Training</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Your Vision. Our Tech.</h1>
        <p>Bida's premier hub for Software Development, Network Implementation, and Expert Computer Training.</p>
        <a href="https://wa.me/2349033422828" class="btn-primary">GET STARTED</a>
    </header>

    <div class="contact-bar">
        📍 <span class="accent-text">Location:</span> Federal Polytechnic Bida Student Center | 
        📞 <span class="accent-text">WhatsApp:</span> 09033422828
    </div>

</body>
</html>
